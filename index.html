<body>

        <h1 id="logo">Tasks</h1>

            <p id="yourTasksLbl">Your Tasks</p>

            </div>

            <div id="task-main">

                        <img class="deleteIcon" src="src/img/delete.svg" alt="delete_icon">
                    </button>
                </div> -->

            </div>

        </div>
        
    </main>

    <script src="src/js/script.js" defer></script>
    <script src="src/js/themeSwitch.js" defer></script>

</html>
